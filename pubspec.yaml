name: flutter_base
description: ThinkPalm FlutterBase Application

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  app_settings: 5.1.1
  bloc: ^9.0.0
  cached_network_image: ^3.4.1
  collection: ^1.19.0
  connectivity_plus: ^6.1.3
  device_info_plus: ^11.3.0
  dio: ^5.8.0+1
  drift: ^2.25.1
  file_selector: ^1.0.3

  firebase_analytics: ^11.4.3
  firebase_analytics_platform_interface: ^4.3.3
  firebase_core: ^3.12.0
  firebase_core_desktop: ^1.0.2
  firebase_core_platform_interface: ^5.4.0
  firebase_crashlytics: ^4.3.3
  firebase_crashlytics_platform_interface: ^3.8.3
  firebase_dynamic_links: ^6.1.3
  firebase_messaging: ^15.2.3
  firebase_performance: ^0.10.1+3
  firebase_remote_config: ^5.4.1

  flutter_bloc: ^9.0.0
  flutter_local_notifications: ^18.0.1
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.4
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.0.17
  flutter_timezone: ^4.1.0
  googleapis_auth: ^1.6.0
  hive: ^2.2.3
  http: ^1.3.0
  image: ^4.5.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  local_auth: ^2.3.0
  mime: ^2.0.0
  oauth2: ^2.0.3
  open_filex: ^4.6.0
  package_info_plus: ^8.2.1
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  provider: ^6.1.2
  pull_to_refresh: ^2.0.0
  rive: ^0.9.1
  rxdart: ^0.28.0
  share_plus: ^10.1.4
  shared_preferences: ^2.5.2
  sqlite3: ^2.7.4
  sqlite3_flutter_libs: ^0.5.30
  synchronized: ^3.3.0+3
  timeago: ^3.7.0
  timezone: ^0.10.0
  tuple: ^2.0.2
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  web: ^1.1.0
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.2

dependency_overrides:
  device_info_plus: ^11.3.0
  firebase_core_platform_interface: ^5.4.0
  http: ^1.3.0
  package_info_plus: ^8.2.1
  web: ^1.1.0
  webview_flutter_wkwebview: 3.17.0

dev_dependencies:
  analyzer: ^7.3.0
  build_runner: ^2.4.15
  drift_dev: ^2.25.2
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  lint: ^2.6.1
  mockito: ^5.4.5

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/

  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto/Roboto-Thin.ttf
          weight: 100
        - asset: fonts/Roboto/Roboto-Light.ttf
          weight: 300
        - asset: fonts/Roboto/Roboto-Regular.ttf
          weight: 400
        - asset: fonts/Roboto/Roboto-Medium.ttf
          weight: 500
        - asset: fonts/Roboto/Roboto-Bold.ttf
          weight: 700
        - asset: fonts/Roboto/Roboto-Black.ttf
          weight: 900
flutter_intl:
  enabled: true

